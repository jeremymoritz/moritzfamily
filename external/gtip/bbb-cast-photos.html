<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bye Bye Birdie 2026 Cast Photos</title>
  <link rel="stylesheet" href="bbb-cast.css">
</head>
<body>
  <div class="hide-names-container">
    <header class="page-header">
      <h1>Bye Bye Birdie GTIP 2026 Cast Photos</h1>
      <div class="header-btns">
        <label class="hide-names-btn" title="Hide names" aria-label="Hide/show cast names">
          <input type="checkbox" id="hide-names" class="hide-names-cb">
          <img src="hide.svg" class="icon-hide" alt="" width="24" height="24">
          <img src="show.svg" class="icon-show" alt="" width="24" height="24">
        </label>
        <button type="button" class="shuffle-btn" title="Randomize order" aria-label="Randomize cast order">
          <img src="randomize.svg" alt="" width="24" height="24">
        </button>
        <button type="button" class="next-round-btn" title="Next round" aria-label="Next round: keep only revealed names or restore full list">
          <img src="next-round.svg" alt="" width="24" height="24">
        </button>
      </div>
    </header>
    <ul class="gallery"></ul>
  </div>
  <script src="bbb-cast.js"></script>
</body>
</html>
